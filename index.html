<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Store | FAQ Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* White theme */
            --bg-page: #ffffff;
            --bg-panel: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent-blue: #0096FF;
            --accent-blue-hover: #0077e6;
            /* Demo Store brand colors */
            --brand-green: #22c55e;
            --brand-yellow: #facc15;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
        }

        .header-title .brand {
            color: var(--accent-blue);
            font-weight: 700;
            -webkit-text-fill-color: initial;
        }

        /* Main content area */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 60px;
        }

        /* Empty state with branding */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state p {
            font-size: 18px;
            font-weight: 300;
            color: var(--text-muted);
        }

        /* Chat Widget - Bottom Right */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            font-family: 'Outfit', sans-serif;
        }

        /* Chat Toggle Button */
        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
            transition: all 0.3s ease;
        }

        .chat-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.5);
        }

        .chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: #1e293b;
        }

        .chat-toggle .close-icon {
            display: none;
        }

        .chat-widget.open .chat-toggle .chat-icon {
            display: none;
        }

        .chat-widget.open .chat-toggle .close-icon {
            display: block;
        }

        /* Chat Panel */
        .chat-panel {
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 380px;
            height: 520px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s ease;
        }

        .chat-widget.open .chat-panel {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* Chat Header */
        .chat-header {
            padding: 16px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header-avatar svg {
            width: 24px;
            height: 24px;
            fill: #1e293b;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-header-status {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            color: #1e293b;
            border-bottom-right-radius: 4px;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
        }

        .message-avatar svg {
            width: 16px;
            height: 16px;
            fill: #1e293b;
        }

        .message.user .message-avatar {
            display: none;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Chat Input */
        .chat-input {
            padding: 12px 16px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input::placeholder {
            color: var(--text-muted);
        }

        .chat-input input:focus {
            border-color: var(--brand-green);
        }

        .chat-input button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-input button:hover {
            opacity: 0.9;
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-input button svg {
            width: 18px;
            height: 18px;
            fill: #1e293b;
        }

        /* Welcome screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .welcome-icon svg {
            width: 36px;
            height: 36px;
            fill: #1e293b;
        }

        .welcome-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .welcome-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestion-btn {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: var(--brand-green);
            background: rgba(34, 197, 94, 0.1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chat-panel {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .chat-widget {
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-title">
            <span class="brand">ChatBot</span> FAQ Assistant
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="empty-state">
            <h1>Demo Store</h1>
            <p>Your friendly customer service assistant</p>
        </div>
    </main>

    <!-- Chat Widget -->
    <div class="chat-widget" id="chatWidget">
        <!-- Toggle Button -->
        <button class="chat-toggle" id="chatToggle">
            <svg class="chat-icon" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
            <svg class="close-icon" viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </button>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-header-avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                    </svg>
                </div>
                <div class="chat-header-info">
                    <div class="chat-header-title">Demo Store Help</div>
                    <div class="chat-header-subtitle">Your friendly assistant, always ready to help!</div>
                </div>
                <div class="chat-header-status"></div>
            </div>

            <!-- Chat Messages / Welcome -->
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                        </svg>
                    </div>
                    <div class="welcome-title">Hello! 👋</div>
                    <div class="welcome-subtitle">I am your Demo Store assistant.<br>Need help with something?</div>
                    <div class="welcome-suggestions">
                        <button class="suggestion-btn" onclick="sendMessage('How do I order?')">How do I order?</button>
                        <button class="suggestion-btn" onclick="sendMessage('When is delivery?')">When is delivery?</button>
                        <button class="suggestion-btn" onclick="sendMessage('What is your return policy?')">Return policy?</button>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button id="sendButton" onclick="sendUserMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Chat Widget Logic
        const chatWidget = document.getElementById('chatWidget');
        const chatToggle = document.getElementById('chatToggle');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const sendButton = document.getElementById('sendButton');

        // Toggle chat widget
        chatToggle.addEventListener('click', () => {
            chatWidget.classList.toggle('open');
        });

        // Webhook URL - use local proxy to avoid CORS
        const API_URL = '/api/chat';

        // Session ID management
        let sessionId = localStorage.getItem('chatbot_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('chatbot_session_id', sessionId);
        }

        let isFirstMessage = true;

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendUserMessage();
            }
        }

        function sendMessage(text) {
            if (!chatWidget.classList.contains('open')) {
                chatWidget.classList.add('open');
            }
            chatInput.value = text;
            sendUserMessage();
        }

        async function sendUserMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Clear input
            chatInput.value = '';

            // Hide welcome screen on first message
            if (isFirstMessage) {
                welcomeScreen.style.display = 'none';
                isFirstMessage = false;
            }

            // Add user message
            addMessage(message, 'user');

            // Show typing indicator
            showTyping();

            try {
                console.log('Sending to:', API_URL, 'message:', message);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'chat',
                        message: message,
                        sessionId: sessionId
                    })
                });

                console.log('Response status:', response.status);
                const text = await response.text();
                console.log('Response text:', text.substring(0, 200));
                
                hideTyping();

                const data = JSON.parse(text);
                if (data.output) {
                    addMessage(data.output, 'bot');
                } else if (data.text) {
                    addMessage(data.text, 'bot');
                } else if (data.message) {
                    addMessage(data.message, 'bot');
                } else if (data.error) {
                    addMessage('Error: ' + data.error, 'bot');
                } else {
                    addMessage('Sorry, something went wrong. Please try again.', 'bot');
                }
            } catch (error) {
                hideTyping();
                console.error('Chat error:', error);
                addMessage('Sorry, I cannot connect to the server. Please try again.', 'bot');
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            if (sender === 'bot') {
                messageDiv.innerHTML = `
                    <div class="message-avatar">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                        </svg>
                    </div>
                    ${text}
                `;
            } else {
                messageDiv.textContent = text;
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
    </script>
</body>

</html>
